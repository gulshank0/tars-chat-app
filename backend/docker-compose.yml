version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tars-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars_dev_password
      POSTGRES_DB: tars_social
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tars -d tars_social"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tars-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
